name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - patch-milestone
          - minor
          - minor-milestone
          - major
          - major-milestone

permissions:
  contents: read

jobs:
  version-bump:
    runs-on: ubuntu-latest
    outputs:
      next-tag: ${{ steps.version.outputs.next-tag }}
      next-version: ${{ steps.version.outputs.next-version }}
      environment: ${{ steps.determine-environment.outputs.environment }}
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Version Bump Action
        uses: gatling/private-actions@version-bump/v1.0.3
        id: version
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          prefix: 'v'
          repo: ${{ github.repository }}
          bump: ${{ inputs.bump || 'patch' }}

      - name: Determine environment
        id: determine-environment
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next-version }}
        run: |
          if [[ "$NEXT_VERSION" == *"milestone"* ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
          else
            echo "environment=production" >> $GITHUB_OUTPUT
          fi
  release:
    needs: version-bump
    runs-on: ubuntu-latest
    environment: ${{ needs.version-bump.outputs.environment }}
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update Chart.yaml with version
        env:
          VERSION: ${{ needs.version-bump.outputs.next-version }}
        run: |
          sed -i "s/^version:.*/version: $VERSION/" Chart.yaml
          
          echo "✓ Updated Chart.yaml to version $VERSION"
          grep -E '^version:' Chart.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Lint Helm chart
        run: helm lint .

      - name: Package Helm chart
        run: |
          helm package ./ --destination ./packaged-charts/
          echo "Packaged chart:"
          ls -lh ./packaged-charts/

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push version change
        env:
          VERSION: ${{ needs.version-bump.outputs.next-version }}
        run: |
          git add Chart.yaml
          git commit -m "chore: bump helm chart version to $VERSION"
          git push

      - name: Create and Push Tag
        env:
          NEXT_TAG: ${{ needs.version-bump.outputs.next-tag }}
          NEXT_VERSION: ${{ needs.version-bump.outputs.next-version }}
        run: |
          echo "The next tag is $NEXT_TAG"
          git tag -a "$NEXT_TAG" -m "Release $NEXT_VERSION"
          git push origin "$NEXT_TAG"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.SE_HELM_AWS_ROLE }}
          aws-region: ${{ vars.SE_HELM_AWS_S3_REGION }}

      - name: Deploy public to S3
        env:
          S3_BUCKET: ${{ vars.SE_HELM_AWS_S3_BUCKET }}
          S3_REGION: ${{ vars.SE_HELM_AWS_S3_REGION }}
          HELM_REPO_URL: ${{ vars.SE_HELM_BASE_URL }}
        run: |
          PAGE_TITLE="Helm Repository"
          
          sed -i "s|{{PAGE_TITLE}}|${PAGE_TITLE}|g" ./public/index.html
          sed -i "s|{{HELM_REPO_URL}}|\"${HELM_REPO_URL}\"|g" ./public/index.html
          aws s3 cp ./public/index.html "s3://${S3_BUCKET}/index.html"
          aws s3 cp ./public/gatling.png "s3://${S3_BUCKET}/gatling.png"
          aws s3 cp ./public/favicon.ico "s3://${S3_BUCKET}/favicon.ico"

      - name: Upload to S3
        env:
          S3_BUCKET: ${{ vars.SE_HELM_AWS_S3_BUCKET }}
          S3_REGION: ${{ vars.SE_HELM_AWS_S3_REGION }}
          VERSION: ${{ needs.version-bump.outputs.next-version }}
        run: |
          CHART_FILE="enterprise-locations-packages-${VERSION}.tgz"
          
          aws s3 cp "./packaged-charts/$CHART_FILE" \
            "s3://${S3_BUCKET}/charts/$CHART_FILE" \
            --region ${S3_REGION}
          
          echo "✓ Chart uploaded to s3://${S3_BUCKET}/$CHART_FILE"

      - name: Update Helm repository index
        env:
          S3_BUCKET: ${{ vars.SE_HELM_AWS_S3_BUCKET }}
          S3_REGION: ${{ vars.SE_HELM_AWS_S3_REGION }}
          HELM_REPO_URL: ${{ vars.SE_HELM_BASE_URL }}
        run: |
          aws s3 cp "s3://${S3_BUCKET}/index.yaml" ./index.yaml \
            --region ${S3_REGION} || echo "index.yaml not found, will create new one"
          
          helm repo index ./packaged-charts/ \
            --url "${HELM_REPO_URL}/charts" \
            --merge ./index.yaml || helm repo index ./packaged-charts/ \
            --url "${HELM_REPO_URL}/charts"
          
          aws s3 cp ./packaged-charts/index.yaml \
            "s3://${S3_BUCKET}/index.yaml" \
            --region ${S3_REGION}
          
          echo "✓ Repository index updated at /index.yaml"

      - name: Create CloudFront invalidation (dev)
        if: needs.version-bump.outputs.environment == 'dev'
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.SE_HELM_AWS_CLOUDFRONT_DISTRIBUTION_ID }}
        run: aws cloudfront create-invalidation --distribution-id ${CLOUDFRONT_DISTRIBUTION_ID} --paths "/*"

      - name: Create CloudFront invalidation (production)
        if: needs.version-bump.outputs.environment == 'production'
        env:
          DOCUMENT_NAME: ${{ vars.CLOUDFRONT_INVALIDATION_DOCUMENT }}
        run: |
          aws ssm start-automation-execution \
            --region eu-west-3 \
            --document-name "${DOCUMENT_NAME}"

      - name: Read Changelog
        id: changelog
        run: |
          CHANGELOG=$(cat CHANGELOG.md)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: needs.version-bump.outputs.environment == 'production'
        with:
          tag_name: ${{ needs.version-bump.outputs.next-tag }}
          name: Helm Chart ${{ needs.version-bump.outputs.next-version }}
          files: ./packaged-charts/*.tgz
          draft: ${{ needs.version-bump.outputs.environment != 'production' }}
          body: |
            ## Helm Chart Release ${{ needs.version-bump.outputs.next-version }}

            **Type**: ${{ needs.version-bump.outputs.environment == 'production' && '✅ Production Release' || '🚧 Milestone (Development)' }}
            **Environment**: ${{ needs.version-bump.outputs.environment }}
            **Bump**: ${{ github.event.inputs.bump }}

            ### Installation

            ```bash
            # Add the Helm repository
            helm repo add ${{ vars.SE_HELM_REPO_NAME }} ${{ vars.SE_HELM_BASE_URL }}

            # Update repositories
            helm repo update

            # Install the chart
            helm install gatling-control-plane ${{ vars.SE_HELM_REPO_NAME }}/enterprise-locations-packages --version ${{ needs.version-bump.outputs.next-version }}
            ```

            ### Changes
            ${{ steps.changelog.outputs.content }}

      - name: Reset Changelog
        run: |
          echo "No changes" > CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "chore: reset CHANGELOG.md after release"
          git push
